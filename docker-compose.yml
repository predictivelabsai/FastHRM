services:
  fasthr:
    build: .
    ports:
      - "5010:5010"
    environment:
      FASTHR_DB: /data/fasthr.sqlite
      FASTHR_PORT: "5010"
      MODEL_PROVIDER: ${MODEL_PROVIDER:-xai}
      MODEL_NAME: ${MODEL_NAME:-grok-4-1-fast-reasoning}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      FASTHR_ADMIN_PASSWORD: ${FASTHR_ADMIN_PASSWORD:-FastHR2026$$}
      FASTHR_SECRET: ${FASTHR_SECRET:-}
    volumes:
      - fasthr-data:/data
volumes:
  fasthr-data:
